[build]
  base = "Clarix-final-folder"
  publish = "Clarix-final-folder"
  functions = "Clarix-final-folder/netlify/functions"

[functions]
  directory = "Clarix-final-folder/netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"